<head>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://yt3.googleusercontent.com/TCl7u351pzOB9ERvwT6wnXXaRU062UN5lTKyloIQ5X89PBpKhaWNkwq73fKJueHom0YNXSY5Ug=s800-c-k-c0x00ffffff-no-rj">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<body>
    <header class="site-header">
        <div class="container">
            <h1>Duklock pravidlá Streamu</h1>
            <button id="theme-toggle" aria-label="Toggle color scheme">
                <span id="theme-icon" class="material-symbols-outlined">light_mode</span>
            </button>

        </div>
    </header>
    <main>
        <div class="main-content">
            <div class="rules" id="rules-content">
                <p>Načítavam...</p>
            </div>
            <div class="currentStream">
                <h3>Momentálny stream</h3>
                <div id="live-wrap">
                    <iframe id="live-player" width="560" height="315" src="https://www.youtube.com/embed/live_stream?channel=UCIAbC7emlDQs-dmgW4GlgnA&autoplay=0" title="DuklockPlus Live Stream" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    <div id="live-fallback">
                        <span class="material-symbols-outlined">videocam_off</span>
                        <p>Stream momentálne offline</p>
                    </div>
                </div>
                <h3>Najnovšie video z DuklockPlus</h3>
                <iframe width="560" height="315" src="https://www.youtube.com/embed/videoseries?list=UUIAbC7emlDQs-dmgW4GlgnA" title="Najnovšie video z DuklockPlus" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"allowfullscreen></iframe>
            </div>
        </div>
